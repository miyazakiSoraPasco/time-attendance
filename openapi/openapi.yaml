openapi: 3.0.3

info:
  title: Attendance API
  version: 1.0.0
  description: 勤怠管理API（JWT認証）
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: "{scheme}://{host}/api"
    description: API Server
    variables:
      scheme:
        default: http
        enum:
          - http
          - https
      host:
        default: localhost:8000
        enum:
          - localhost:8000
          - api.example.com

tags:
  - name: Attendance
    description: 勤怠打刻・勤怠取得に関するAPI

  - name: Auth
    description: 認証・JWTトークン管理API

paths:
  /login:
    $ref: './paths/auth.yaml#/login'
  /attendances/today:
    $ref: './paths/attendance.yaml#/today'
  /attendances/clock-in:
    $ref: './paths/attendance.yaml#/clockIn'
  /attendances/clock-out:
    $ref: './paths/attendance.yaml#/clockOut'

components:
  schemas:
    $ref: './components/schemas/index.yaml'
  responses:
    $ref: './components/responses.yaml'
  securitySchemes:
    $ref: './components/securitySchemes.yaml'

security:
  - BearerAuth: []
