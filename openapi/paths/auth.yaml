login:
  post:
    operationId: loginApi
    tags:
      - Auth
    summary: ログイン
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/index.yaml#/LoginRequest'
    responses:
      '200':
        description: JWTトークン
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/LoginResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '422':
        $ref: '../components/responses.yaml#/ValidationError'
      '500':
        $ref: '../components/responses.yaml#/ServerError'
logout:
  post:
    operationId: logoutApi
    tags:
      - Auth
    summary: ログアウト
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            description: ログアウトに必要なデータなし（JWTヘッダ必須）
    responses:
      '200':
        description: ログアウト成功
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Logged out successfully"
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '500':
        $ref: '../components/responses.yaml#/ServerError'

authMe:
  get:
    operationId: authMeApi
    tags:
      - Auth
    summary: ログイン中ユーザー情報取得
    responses:
      '200':
        description: 認証済みユーザー情報
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/UserResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '500':
        $ref: '../components/responses.yaml#/ServerError'
